name: Deploy Front-end Oficial

on:
  push:
    branches:
      - desenvolvimento

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ENV_DESENVOLVIMENTO }}" > .env.desenvolvimento

      - name: Build project
        run: npm run build -- --mode desenvolvimento

      - name: Install sshpass
        run: sudo apt-get install -y sshpass    

      - name: Deploy to server
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }} 
        run: |
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete --omit-dir-times -e "ssh -o StrictHostKeyChecking=no" ./dist/ rpcuser@177.66.168.178:/var/www/html/solutions/solutions-desenvolvimento/playbook-desenvolvimento/dist/
